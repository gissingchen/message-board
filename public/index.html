<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的留言板</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page">
    <h1>我的留言板</h1>
    <p>这是我的第一个全栈网站。</p>

    <div class="card">
      <input id="nameInput" type="text" placeholder="请输入你的名字">
      <textarea id="contentInput" placeholder="请输入留言内容"></textarea>
      <button id="submitBtn">发布留言</button>
    </div>

    <div id="messageList" class="message-list">
      <div class="message-item">
        <strong>系统：</strong>
        <span>欢迎来到你的第一个网站！</span>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
